# nginx for the prod web image — serves the Vite build as a SPA.
#
# No reverse proxy to the API: the FE points at the API directly via
# VITE_API_BASE_URL (set at build time).  CORS must be allowed on the API
# for the FE origin — see docs/22-railway-deploy.md.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hashed assets — cache aggressively
    location /assets/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # Service worker — never cache (must always re-check)
    location = /sw.js {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
    }

    # PWA manifest
    location = /manifest.webmanifest {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=86400";
    }

    # SPA fallback — every other path resolves to index.html so React Router
    # can pick up the route on the client.
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache";
    }

    # Tiny health probe so Railway's healthcheck has a target if you wire one.
    location = /healthz {
        access_log off;
        return 200 "ok";
        add_header Content-Type text/plain;
    }
}
