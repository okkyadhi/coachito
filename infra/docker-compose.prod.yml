# Production override.  Use alongside the base compose:
#
#   docker compose -f infra/docker-compose.yml -f infra/docker-compose.prod.yml up -d
#
# Differences from dev:
# - no source bind mounts (containers run the baked-in images)
# - api / worker / web pull from the registry
# - nginx terminates TLS + reverse-proxies to api + web
# - env values come from ${ENV_FILE:-.env.prod}
# - tools profile (adminer) intentionally not enabled here

services:
  postgres:
    restart: always
    # In prod we expose only inside the docker network; remove host port.
    ports: !reset []
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    restart: always
    ports: !reset []

  minio:
    # Prod swaps MinIO for R2/S3; this override exists so dev compose stays
    # untouched.  Set MINIO_PUBLIC_HOST to your domain or comment the service
    # out entirely and configure S3_* envs to point at R2.
    restart: always
    ports: !reset []

  api:
    image: ${REGISTRY:-ghcr.io/coachito}/api:${TAG:-latest}
    build: !reset null
    restart: always
    ports: !reset []   # nginx fronts this
    volumes: !reset []
    env_file:
      - ${ENV_FILE:-../.env.prod}
    environment:
      ENVIRONMENT: production
      # Sentry DSN comes from env_file; tags filled in at runtime.

  worker:
    image: ${REGISTRY:-ghcr.io/coachito}/api:${TAG:-latest}
    build: !reset null
    restart: always
    volumes: !reset []
    env_file:
      - ${ENV_FILE:-../.env.prod}
    environment:
      ENVIRONMENT: production

  web:
    image: ${REGISTRY:-ghcr.io/coachito}/web:${TAG:-latest}
    build: !reset null
    restart: always
    ports: !reset []
    volumes: !reset []

  nginx:
    image: nginx:1.27-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - api
      - web
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
