name: coachito

services:
  # ── Infrastructure ──────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: coachito
      POSTGRES_PASSWORD: coachito
      POSTGRES_DB: coachito
    ports:
      - "5433:5432"   # 5432 may be taken by another project; connect from host on 5433
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coachito -d coachito"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6380:6379"   # 6379 may be taken by another project; connect from host on 6380
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP
    environment:
      MP_MAX_MESSAGES: "500"
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  minio_init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/coachito-dev &&
        mc anonymous set download local/coachito-dev &&
        echo 'bucket coachito-dev ready (public-read)'
      "

  # ── Application ─────────────────────────────────────────────────

  api:
    build:
      context: ../
      dockerfile: infra/api/Dockerfile
    restart: unless-stopped
    ports:
      - "8002:8000"   # 8000/8001 may be taken by another project; connect from host on 8002
    # Repo-root .env so secrets like GEMINI_API_KEY interpolate even though
    # this compose file lives in infra/.  Compose's default .env search is
    # next to the compose file; this points it at the canonical location.
    env_file:
      - ../.env
    environment:
      # Runtime uses non-superuser coachito_api so RLS is enforced.
      # Migrations: ALEMBIC_DATABASE_URL override picked up by env.py (still uses coachito superuser).
      DATABASE_URL: postgresql+asyncpg://coachito_api:coachito_api@postgres:5432/coachito
      ALEMBIC_DATABASE_URL: postgresql+asyncpg://coachito:coachito@postgres:5432/coachito
      REDIS_URL: redis://redis:6379/0
      SMTP_HOST: mailpit
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@coachito.dev
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: coachito-dev
      ENVIRONMENT: development
      JWT_SECRET: dev-secret-change-in-production
      # Magic-link emails point users back at the web app on the host.
      WEB_URL: http://localhost:5174
      GOOGLE_CLIENT_ID: ""
      # GEMINI_API_KEY + GEMINI_MODEL come from the env_file (../.env) above.
      # Listing them here would override env_file with an empty interpolation,
      # since Compose's default .env discovery looks next to docker-compose.yml
      # (infra/), not the repo root.
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../apps/api/alembic:/app/apps/api/alembic
      - ../apps/api/tests:/app/apps/api/tests
      - ../apps/api/scripts:/app/apps/api/scripts
      - ../apps/api/data:/app/apps/api/data
      - ../apps/api/templates:/app/apps/api/templates
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/healthz"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  worker:
    build:
      context: ../
      dockerfile: infra/api/Dockerfile
    restart: unless-stopped
    command: ["rq", "worker", "--url", "redis://redis:6379/0", "default"]
    environment:
      DATABASE_URL: postgresql+asyncpg://coachito:coachito@postgres:5432/coachito
      ALEMBIC_DATABASE_URL: postgresql+asyncpg://coachito:coachito@postgres:5432/coachito
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT: http://minio:9000
      S3_PUBLIC_ENDPOINT: http://localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_BUCKET: coachito-dev
      ENVIRONMENT: development
    volumes:
      - ../apps/api/src:/app/apps/api/src
      - ../apps/api/scripts:/app/apps/api/scripts
      - ../apps/api/templates:/app/apps/api/templates
      - ../apps/api/data:/app/apps/api/data
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: ../
      dockerfile: infra/web/Dockerfile
    restart: unless-stopped
    ports:
      - "5174:5173"   # 5173 may be taken by another project; connect from host on 5174
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ../apps/web/src:/app/apps/web/src
      - ../apps/web/index.html:/app/apps/web/index.html
      - ../apps/web/vite.config.ts:/app/apps/web/vite.config.ts
      - ../apps/web/tailwind.config.ts:/app/apps/web/tailwind.config.ts
      - ../apps/web/postcss.config.cjs:/app/apps/web/postcss.config.cjs
    depends_on:
      - api

  # ── Optional tools (--profile tools) ────────────────────────────

  adminer:
    image: adminer:4
    restart: unless-stopped
    ports:
      - "8082:8080"   # 8080 may be taken; adminer on 8082
    profiles: ["tools"]
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  minio_data:
